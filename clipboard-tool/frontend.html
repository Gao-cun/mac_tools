<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>剪切板翻译助手</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 40px 20px;
}
.container { max-width: 720px; width: 100%; }

h1 {
  font-size: 24px;
  font-weight: 600;
  letter-spacing: -0.3px;
  margin-bottom: 24px;
}

.card {
  background: #1e293b;
  border: 1px solid #334155;
  border-radius: 12px;
  padding: 20px 24px;
  margin-bottom: 16px;
}

.status-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.status-info {
  display: flex;
  align-items: center;
  gap: 10px;
}
.dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
}
.dot.on { background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,0.5); }
.dot.off { background: #ef4444; box-shadow: 0 0 8px rgba(239,68,68,0.5); }
.status-text { font-size: 15px; font-weight: 500; }

.btn {
  padding: 8px 20px;
  border-radius: 8px;
  border: none;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
}
.btn-on {
  background: #22c55e;
  color: #052e16;
}
.btn-on:hover { background: #16a34a; }
.btn-off {
  background: #ef4444;
  color: #450a0a;
}
.btn-off:hover { background: #dc2626; }

.section-label {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #94a3b8;
  margin-bottom: 8px;
}

textarea {
  width: 100%;
  background: #0f172a;
  border: 1px solid #334155;
  border-radius: 8px;
  color: #e2e8f0;
  font-size: 14px;
  font-family: inherit;
  padding: 12px;
  resize: vertical;
  min-height: 70px;
  line-height: 1.5;
  transition: border-color 0.15s;
}
textarea:focus {
  outline: none;
  border-color: #6366f1;
}

.preview-box {
  background: #0f172a;
  border: 1px solid #334155;
  border-radius: 8px;
  padding: 14px;
  font-size: 14px;
  line-height: 1.6;
  min-height: 60px;
  white-space: pre-wrap;
  word-break: break-word;
}
.highlight {
  background: rgba(99,102,241,0.2);
  border-radius: 3px;
  padding: 1px 0;
}

.log-list {
  max-height: 260px;
  overflow-y: auto;
}
.log-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid #1e293b;
  font-size: 13px;
}
.log-item:last-child { border-bottom: none; }
.log-time {
  color: #64748b;
  font-variant-numeric: tabular-nums;
  flex-shrink: 0;
  width: 48px;
}
.log-preview {
  color: #94a3b8;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.empty-state {
  text-align: center;
  color: #64748b;
  padding: 30px 0;
  font-size: 14px;
}

.footer {
  text-align: center;
  color: #475569;
  font-size: 12px;
  margin-top: 12px;
}

.saved-tip {
  color: #22c55e;
  font-size: 12px;
  opacity: 0;
  transition: opacity 0.3s;
  margin-left: 8px;
}
.saved-tip.show { opacity: 1; }

.toggle-wrapper {
  display: flex;
  align-items: center;
  gap: 10px;
}

@media (max-width: 500px) {
  .container { padding: 0; }
  .card { padding: 16px; }
}
</style>
</head>
<body>
<div class="container">
  <h1>剪切板翻译助手</h1>

  <div class="card">
    <div class="status-row">
      <div class="status-info">
        <div class="dot" id="statusDot"></div>
        <span class="status-text" id="statusText">加载中...</span>
      </div>
      <button class="btn" id="toggleBtn" onclick="toggle()">切换</button>
    </div>
  </div>

  <div class="card">
    <div class="section-label">前缀 Prefix</div>
    <textarea id="prefixInput" placeholder="粘贴到原文之前的内容，如翻译 prompt…" oninput="onConfigChange()"></textarea>
  </div>

  <div class="card">
    <div class="section-label">后缀 Suffix</div>
    <textarea id="suffixInput" placeholder="粘贴到原文之后的内容，如专业词汇表…" oninput="onConfigChange()"></textarea>
  </div>

  <div class="card">
    <div class="section-label">预览 <span style="font-weight:400;color:#64748b;font-size:12px">— 基于示例文本</span></div>
    <div class="preview-box" id="previewBox"></div>
  </div>

  <div class="card">
    <div class="section-label">转换日志</div>
    <div class="log-list" id="logList">
      <div class="empty-state">等待首次转换…</div>
    </div>
  </div>

  <div class="footer">复制文本后自动添加前后缀 · 在浏览器中保持此页面打开</div>
</div>

<script>
const DEMO = "Artificial intelligence is transforming every industry.";

let saveTimer = null;

async function fetchAPI(path, opts = {}) {
  const res = await fetch(path, opts);
  return res.json();
}

async function loadStatus() {
  const data = await fetchAPI("/api/status");
  document.getElementById("prefixInput").value = data.prefix || "";
  document.getElementById("suffixInput").value = data.suffix || "";
  updateStatusUI(data.enabled);
  updatePreview();
}

function updateStatusUI(enabled) {
  const dot = document.getElementById("statusDot");
  const text = document.getElementById("statusText");
  const btn = document.getElementById("toggleBtn");
  if (enabled) {
    dot.className = "dot on";
    text.textContent = "运行中 — 剪切板监控已开启";
    btn.className = "btn btn-off";
    btn.textContent = "暂停";
  } else {
    dot.className = "dot off";
    text.textContent = "已暂停 — 剪切板监控已关闭";
    btn.className = "btn btn-on";
    btn.textContent = "启用";
  }
}

function updatePreview() {
  const prefix = document.getElementById("prefixInput").value;
  const suffix = document.getElementById("suffixInput").value;
  const transformed = prefix + DEMO + suffix;
  document.getElementById("previewBox").textContent = transformed || DEMO;
}

function onConfigChange() {
  updatePreview();
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveConfig, 500);
}

async function saveConfig() {
  const prefix = document.getElementById("prefixInput").value;
  const suffix = document.getElementById("suffixInput").value;
  await fetchAPI("/api/config", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ prefix, suffix }),
  });
}

async function toggle() {
  const data = await fetchAPI("/api/toggle", { method: "POST" });
  updateStatusUI(data.enabled);
}

async function loadLogs() {
  const data = await fetchAPI("/api/logs");
  const container = document.getElementById("logList");
  if (!data.logs || data.logs.length === 0) {
    container.innerHTML = '<div class="empty-state">等待首次转换…</div>';
    return;
  }
  container.innerHTML = data.logs.reverse().map(l => `
    <div class="log-item">
      <span class="log-time">${esc(l.time)}</span>
      <span class="log-preview" title="${esc(l.original)}">${esc(l.preview)}</span>
    </div>
  `).join("");
}

function esc(s) {
  return s.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}

loadStatus();
updatePreview();
setInterval(loadLogs, 2000);
setInterval(loadStatus, 5000);
</script>
</body>
</html>
